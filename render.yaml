services:
  - type: web
    name: heirlock-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/api
    buildCommand: cd ../.. && npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @heirlock/config build && pnpm --filter @heirlock/ai-provider build && pnpm --filter @heirlock/sodex-signing build && pnpm --filter @heirlock/api exec prisma generate && pnpm --filter @heirlock/api build
    startCommand: pnpm exec prisma migrate deploy && pnpm start
    healthCheckPath: /api/health/live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: HEIRLOCK_DEFAULT_PROFILE
        value: mainnet-limited
      - key: HEIRLOCK_ALLOW_TESTNET
        value: "false"
      - key: TRADING_MAX_NOTIONAL_USD
        value: "1"
      - key: MAINNET_TEST_MAX_NOTIONAL_USD
        value: "1"
      - key: TESTNET_TEST_MAX_NOTIONAL_USD
        value: "100000"
      - key: SODEX_LOCAL_TEST_WALLET_ONLY
        value: "true"
      - key: TRADING_ENABLED
        value: "true"
      - key: KILL_SWITCH_TRADING
        value: "false"
      - key: AI_PRIMARY_PROVIDER
        value: nvidia
      - key: AI_FALLBACK_PROVIDERS
        value: cerebras,sambanova,groq
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: WALLET_ENCRYPT_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SOSO_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: TRADING_ALLOWLIST
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: SIWE_DOMAIN
        sync: false
      - key: SIWE_URI
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
